name: sports_calendar_sync
description: "Unified sports calendar sync app - sync your favorite team schedules to Google/iCalendar."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: 2.6.1

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.7

  # Navigation
  go_router: ^15.1.2

  # Network
  http: ^1.6.0

  # Utilities
  intl: ^0.20.2
  timezone: ^0.10.1
  url_launcher: ^6.3.1
  share_plus: ^11.0.0
  flutter_secure_storage: ^9.2.4

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Sign in with Apple
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
  generate: true  # for flutter_localizations ARB generation
